<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather predictive System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --sky-deep:#050d1a;--aurora-blue:#1e90ff;--aurora-cyan:#00e5ff;
    --aurora-green:#00ffa3;--aurora-orange:#ff6b35;--aurora-purple:#a855f7;
    --text-primary:#e8f4fd;--text-secondary:#7eb8e8;--text-muted:#3d6080;
    --glass:rgba(14,32,64,0.65);--glass-border:rgba(30,144,255,0.15);--glow:rgba(30,144,255,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Syne',sans-serif;background:var(--sky-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}
  .sky-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,#0a2a5e 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#0a1a3e 0%,transparent 50%),linear-gradient(180deg,#020810 0%,#050d1a 40%,#0a1628 100%);}
  .stars{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);}
  @keyframes twinkle{0%,100%{opacity:var(--min-op,.2);}50%{opacity:var(--max-op,.8);}}
  .aurora-strip{position:fixed;top:0;left:0;right:0;height:3px;z-index:1;background:linear-gradient(90deg,transparent,var(--aurora-blue),var(--aurora-cyan),var(--aurora-green),var(--aurora-blue),transparent);animation:af 4s ease-in-out infinite;}
  @keyframes af{0%,100%{opacity:.6;transform:scaleX(.8);}50%{opacity:1;transform:scaleX(1);}}
  .app{position:relative;z-index:2;max-width:1440px;margin:0 auto;padding:20px 24px;}

  /* HEADER */
  header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--glass-border);flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--aurora-blue),var(--aurora-cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px var(--glow);}
  .logo-text{font-size:26px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text-primary),var(--aurora-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
  .search-row{display:flex;gap:8px;flex:1;max-width:500px;align-items:center;}
  .search-input{flex:1;background:var(--glass);border:1px solid var(--glass-border);color:var(--text-primary);padding:11px 16px;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;outline:none;backdrop-filter:blur(10px);transition:all .3s;}
  .search-input::placeholder{color:var(--text-muted);}
  .search-input:focus{border-color:var(--aurora-blue);box-shadow:0 0 0 3px rgba(30,144,255,.15);}
  .btn{border:none;border-radius:12px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .25s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .btn-primary{background:linear-gradient(135deg,var(--aurora-blue),var(--aurora-cyan));color:white;padding:11px 18px;font-size:13px;box-shadow:0 4px 14px rgba(30,144,255,.35);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(30,144,255,.45);}
  .btn-gps{background:rgba(0,255,163,.1);border:1px solid rgba(0,255,163,.3);color:var(--aurora-green);padding:11px 14px;font-size:13px;}
  .btn-gps:hover{background:rgba(0,255,163,.18);}
  .btn-gps.spin{animation:gpsspin 1s ease-in-out infinite;}
  @keyframes gpsspin{0%,100%{opacity:1;}50%{opacity:.4;}}
  .header-right{margin-left:auto;font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-align:right;line-height:1.8;flex-shrink:0;}
  .live-refresh{display:inline-flex;align-items:center;gap:5px;color:var(--aurora-green);font-size:10px;margin-top:2px;}
  .rdot{width:6px;height:6px;border-radius:50%;background:var(--aurora-green);animation:rdot 2s ease-in-out infinite;box-shadow:0 0 6px var(--aurora-green);}
  @keyframes rdot{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}

  /* QUICK BAR */
  .quick-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
  .qbar-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:1px;}
  .qc-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text-secondary);padding:7px 14px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
  .qc-btn:hover{border-color:var(--aurora-blue);color:var(--aurora-cyan);background:rgba(30,144,255,.1);}
  .qc-btn.active{border-color:var(--aurora-cyan);color:var(--aurora-cyan);background:rgba(0,229,255,.1);}

  /* CARD */
  .card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;backdrop-filter:blur(20px);transition:border-color .3s;}
  .card:hover{border-color:rgba(30,144,255,.28);}
  .card-title{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px;}
  .card-title::before{content:'';width:16px;height:1px;background:var(--aurora-blue);}

  /* GRID */
  .main-grid{display:grid;grid-template-columns:1fr 1fr 370px;gap:14px;}

  /* HERO */
  .hero-card{grid-column:1/3;padding:30px 34px;position:relative;overflow:hidden;animation:fu .5s ease both;}
  @keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  .hero-card::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(30,144,255,.1) 0%,transparent 70%);pointer-events:none;}
  .city-label{font-size:12px;font-weight:600;color:var(--aurora-cyan);letter-spacing:3px;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
  .live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(0,255,163,.1);border:1px solid rgba(0,255,163,.25);border-radius:20px;padding:2px 8px;font-size:9px;color:var(--aurora-green);letter-spacing:1px;}
  .temp-big{font-size:90px;font-weight:800;line-height:1;letter-spacing:-4px;display:inline-block;background:linear-gradient(135deg,var(--text-primary) 0%,var(--aurora-cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .temp-unit-sup{font-size:40px;letter-spacing:0;font-weight:600;}
  .updated-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-bottom:4px;}
  .wx-desc{font-size:20px;font-weight:600;color:var(--text-secondary);margin-bottom:18px;}
  .wx-meta{display:flex;gap:18px;flex-wrap:wrap;}
  .mi{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text-secondary);}
  .wx-emoji{position:absolute;right:30px;top:50%;transform:translateY(-50%);font-size:88px;opacity:.85;filter:drop-shadow(0 0 22px rgba(30,144,255,.4));animation:flt 4s ease-in-out infinite;}
  @keyframes flt{0%,100%{transform:translateY(-50%);}50%{transform:translateY(-55%) translateX(4px);}}

  /* MAP */
  .map-card{grid-column:3;grid-row:1/3;overflow:hidden;padding:0;display:flex;flex-direction:column;animation:fu .5s ease .1s both;min-height:380px;}
  .map-header{padding:14px 18px 12px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .map-coords{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
  #weatherMap{flex:1;min-height:320px;border-radius:0 0 20px 20px;}
  .leaflet-container{background:#05101f !important;}
  .leaflet-tile{filter:invert(.85) hue-rotate(180deg) brightness(.82) contrast(1.1) saturate(.65);}
  .leaflet-control-zoom a{background:rgba(5,13,26,.9) !important;color:var(--aurora-cyan) !important;border-color:var(--glass-border) !important;}
  .leaflet-control-attribution{background:rgba(5,13,26,.7) !important;color:var(--text-muted) !important;font-size:9px !important;}
  .leaflet-control-attribution a{color:var(--text-muted) !important;}
  .leaflet-popup-content-wrapper{background:rgba(5,16,36,.95);border:1px solid var(--glass-border);color:var(--text-primary);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
  .leaflet-popup-tip{background:rgba(5,16,36,.95);}
  .pin-dot{width:14px;height:14px;background:var(--aurora-cyan);border-radius:50%;border:3px solid white;box-shadow:0 0 0 4px rgba(0,229,255,.3),0 0 18px rgba(0,229,255,.5);animation:ping 2s ease-in-out infinite;}
  @keyframes ping{0%,100%{box-shadow:0 0 0 4px rgba(0,229,255,.3),0 0 18px rgba(0,229,255,.5);}50%{box-shadow:0 0 0 9px rgba(0,229,255,.1),0 0 28px rgba(0,229,255,.6);}}

  /* STATS */
  .stats-card{grid-column:1/3;padding:18px 26px;display:flex;gap:0;animation:fu .5s ease .15s both;}
  .stat-item{flex:1;text-align:center;padding:0 14px;border-right:1px solid rgba(30,144,255,.08);}
  .stat-item:last-child{border-right:none;}
  .sv{font-size:24px;font-weight:700;letter-spacing:-1px;margin-bottom:3px;}
  .sl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
  .sbar{width:60%;height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin:7px auto 0;overflow:hidden;}
  .sbf{height:100%;border-radius:2px;transition:width 1.2s ease;}

  /* FORECAST */
  .forecast-card{grid-column:1/3;padding:22px 26px;animation:fu .5s ease .22s both;}
  .fc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px;}
  .fc-day{background:rgba(255,255,255,.02);border:1px solid rgba(30,144,255,.07);border-radius:14px;padding:14px 8px;text-align:center;transition:all .3s;cursor:default;}
  .fc-day:hover{background:rgba(30,144,255,.07);border-color:rgba(30,144,255,.2);transform:translateY(-3px);}
  .fc-day.today{background:rgba(30,144,255,.1);border-color:rgba(30,144,255,.26);}
  .fc-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
  .fc-emo{font-size:26px;margin-bottom:8px;}
  .fc-temps{display:flex;justify-content:center;gap:6px;font-size:13px;font-weight:600;}
  .th{color:var(--aurora-orange);}.tl{color:var(--text-muted);}
  .fc-desc{font-size:9px;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace;}
  .fc-rain{font-size:9px;color:var(--aurora-cyan);margin-top:3px;font-family:'DM Mono',monospace;}

  /* INSIGHTS */
  .insights-card{grid-column:3;padding:22px;animation:fu .5s ease .2s both;overflow-y:auto;max-height:500px;}
  .insights-card::-webkit-scrollbar{width:3px;}
  .insights-card::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:2px;}
  .ins-item{padding:11px 0;border-bottom:1px solid rgba(30,144,255,.07);}
  .ins-item:last-child{border-bottom:none;}
  .ins-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
  .ins-val{font-size:14px;font-weight:600;color:var(--text-primary);}
  .ins-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;margin-top:5px;line-height:1.5;}
  .bg{background:rgba(0,255,163,.1);color:var(--aurora-green);border:1px solid rgba(0,255,163,.25);}
  .bw{background:rgba(255,107,53,.1);color:var(--aurora-orange);border:1px solid rgba(255,107,53,.25);}
  .bi{background:rgba(30,144,255,.1);color:var(--aurora-cyan);border:1px solid rgba(30,144,255,.25);}

  /* HOURLY */
  .hourly-card{grid-column:1/3;padding:22px 26px;animation:fu .5s ease .28s both;}
  .hr-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-top:14px;scrollbar-width:thin;scrollbar-color:var(--glass-border) transparent;}
  .hr-item{min-width:66px;background:rgba(255,255,255,.02);border:1px solid rgba(30,144,255,.07);border-radius:12px;padding:11px 8px;text-align:center;flex-shrink:0;transition:all .3s;}
  .hr-item:hover{background:rgba(30,144,255,.08);border-color:rgba(30,144,255,.2);}
  .hr-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);margin-bottom:6px;}
  .hr-emo{font-size:18px;margin-bottom:6px;}
  .hr-temp{font-size:13px;font-weight:700;color:var(--text-primary);}
  .hr-rain{font-size:9px;color:var(--aurora-cyan);margin-top:3px;}

  /* STATE */
  .state-screen{grid-column:1/-1;padding:60px;text-align:center;}
  .spinner{width:44px;height:44px;border:3px solid rgba(30,144,255,.1);border-top-color:var(--aurora-blue);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 18px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .st{font-size:18px;font-weight:700;margin-bottom:7px;}
  .ss{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);}

  /* RESPONSIVE */
  @media(max-width:1024px){
    .main-grid{grid-template-columns:1fr 1fr;}
    .hero-card{grid-column:1/3;}
    .map-card{grid-column:1/3;grid-row:auto;min-height:280px;}
    .stats-card,.forecast-card,.hourly-card{grid-column:1/3;}
    .insights-card{grid-column:1/3;grid-row:auto;max-height:none;}
    .wx-emoji{display:none;}
    .temp-big{font-size:70px;}
  }
  @media(max-width:640px){
    .app{padding:14px;}
    .search-row{max-width:100%;flex:1 1 100%;}
    .main-grid{grid-template-columns:1fr;}
    .hero-card,.map-card,.stats-card,.forecast-card,.insights-card,.hourly-card{grid-column:1;grid-row:auto;}
    .fc-grid{grid-template-columns:repeat(3,1fr);}
    .stats-card{flex-wrap:wrap;}
    .stat-item{min-width:90px;}
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>
<div class="sky-bg"></div>
<div class="stars" id="stars"></div>
<div class="aurora-strip"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">🌐</div>
      <div>
        <div class="logo-text">Weather</div>
        <div class="logo-sub">Predictive System</div>
      </div>
    </div>

    <div class="search-row">
      <input class="search-input" id="cityInput" type="text" placeholder="Enter city name (e.g. Mumbai, Paris…)" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-primary" onclick="doSearch()">🔍 Search</button>
      <button class="btn btn-gps" id="gpsBtn" onclick="detectGPS()" title="Auto-detect my location">📍 My Location</button>
    </div>

    <div class="header-right">
      <div id="clockDate"></div>
      <div id="clockTime" style="font-size:17px;font-weight:600;color:var(--text-secondary)"></div>
      <div class="live-refresh" id="liveTag" style="display:none"><span class="rdot"></span>LIVE · auto-refresh 60s</div>
    </div>
  </header>

  <div class="quick-bar">
    <span class="qbar-label">QUICK:</span>
    <button class="qc-btn" onclick="loadCity('Guwahati')">Guwahati</button>
    <button class="qc-btn" onclick="loadCity('Mumbai')">Mumbai</button>
    <button class="qc-btn" onclick="loadCity('Delhi')">Delhi</button>
    <button class="qc-btn" onclick="loadCity('Kolkata')">Kolkata</button>
    <button class="qc-btn" onclick="loadCity('London')">London</button>
    <button class="qc-btn" onclick="loadCity('New York')">New York</button>
    <button class="qc-btn" onclick="loadCity('Tokyo')">Tokyo</button>
    <button class="qc-btn" onclick="loadCity('Sydney')">Sydney</button>
    <button class="qc-btn" onclick="loadCity('Dubai')">Dubai</button>
  </div>

  <div class="main-grid" id="mainGrid">
    <div class="card state-screen">
      <div style="font-size:56px;margin-bottom:14px">🌍</div>
      <div class="st">Search any city to begin</div>
      <div class="ss">Real-time weather · Interactive map · Predictive insights</div>
      <div class="ss" style="margin-top:10px">Or tap <strong style="color:var(--aurora-green)">📍 My Location</strong> to auto-detect via GPS</div>
    </div>
  </div>
</div>

<script>
const KEY  = '30a7a10a515e8af7967651554bea877a';
const BASE = 'https://api.openweathermap.org/data/2.5';
let timer = null, map = null, marker = null;

/* Stars */
const se = document.getElementById('stars');
for(let i=0;i<130;i++){
  const s=document.createElement('div');s.className='star';
  const z=Math.random()*2+.5;
  s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${-Math.random()*4}s;--min-op:${.1+Math.random()*.2};--max-op:${.4+Math.random()*.5};`;
  se.appendChild(s);
}

/* Clock */
function tick(){
  const n=new Date();
  document.getElementById('clockDate').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('clockTime').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick();setInterval(tick,1000);

/* Helpers */
function emo(id,nt){
  if(id>=200&&id<300)return'⛈️';if(id>=300&&id<400)return'🌦️';
  if(id>=500&&id<600)return id===511?'🌨️':id<502?'🌧️':'🌊';
  if(id>=600&&id<700)return id<602?'🌨️':'❄️';
  if(id>=700&&id<800)return id===741?'🌫️':id===781?'🌪️':'🌁';
  if(id===800)return nt?'🌙':'☀️';if(id===801)return nt?'🌙':'🌤️';if(id===802)return'⛅';return'☁️';
}
function wd(d){return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8];}
function pb(pct,col){return`<div class="sbar"><div class="sbf" style="width:${pct}%;background:${col}"></div></div>`;}
function aql(a){const l=['','Good','Fair','Moderate','Poor','Very Poor'];const c=['','bg','bg','bi','bw','bw'];return{l:l[a]||'N/A',c:c[a]||'bi'};}

/* State */
function loading(msg){
  document.getElementById('mainGrid').innerHTML=`<div class="card state-screen"><div class="spinner"></div><div class="st">${msg}</div><div class="ss">Fetching live weather data…</div></div>`;
  killMap();
}
function errState(msg){
  document.getElementById('mainGrid').innerHTML=`<div class="card state-screen"><div style="font-size:44px;margin-bottom:14px">⚠️</div><div class="st">Could not load weather</div><div class="ss">${msg}</div></div>`;
  killMap();
}
function killMap(){if(map){map.remove();map=null;marker=null;}}

/* Map */
function initMap(lat,lon,label){
  const el=document.getElementById('weatherMap');if(!el)return;
  if(!map){
    map=L.map('weatherMap',{zoomControl:true}).setView([lat,lon],11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
    // OWM temperature overlay
    L.tileLayer(`https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${KEY}`,{opacity:.5,maxZoom:19}).addTo(map);
  } else {
    map.setView([lat,lon],11,{animate:true});
  }
  const icon=L.divIcon({className:'',html:'<div class="pin-dot"></div>',iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-14]});
  if(marker){marker.setLatLng([lat,lon]);marker.setPopupContent(`<b style="color:#00e5ff">${label}</b><br><span style="font-family:monospace;font-size:11px">${lat.toFixed(4)}°, ${lon.toFixed(4)}°</span>`);}
  else{marker=L.marker([lat,lon],{icon}).addTo(map).bindPopup(`<b style="color:#00e5ff">${label}</b><br><span style="font-family:monospace;font-size:11px">${lat.toFixed(4)}°, ${lon.toFixed(4)}°</span>`).openPopup();}
  const ce=document.getElementById('mcoords');if(ce)ce.textContent=`${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
}

/* GPS */
function detectGPS(){
  if(!navigator.geolocation){alert('Geolocation not supported.');return;}
  const btn=document.getElementById('gpsBtn');
  btn.classList.add('spin');btn.textContent='📍 Locating…';
  navigator.geolocation.getCurrentPosition(
    p=>{btn.classList.remove('spin');btn.textContent='📍 My Location';fetchByCoords(p.coords.latitude,p.coords.longitude);},
    _=>{btn.classList.remove('spin');btn.textContent='📍 My Location';errState('Location access denied. Please search manually.');},
    {timeout:12000}
  );
}

/* Active city */
function markActive(city){
  document.querySelectorAll('.qc-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.trim().toLowerCase()===city.toLowerCase());
  });
}

function doSearch(){
  const c=document.getElementById('cityInput').value.trim();
  if(!c)return;loadCity(c);
}

async function loadCity(city){
  document.getElementById('cityInput').value=city;
  markActive(city);
  loading(`Loading ${city}…`);
  clearInterval(timer);
  try{
    const r=await fetch(`${BASE}/weather?q=${encodeURIComponent(city)}&appid=${KEY}&units=metric`);
    if(!r.ok){errState(`"${city}" not found. Try a different spelling.`);return;}
    const d=await r.json();
    await fetchByCoords(d.coord.lat,d.coord.lon,city);
  }catch(e){errState('Network error. Check your connection.');}
}

async function fetchByCoords(lat,lon,hint){
  clearInterval(timer);
  try{
    const [wr,fr,ar]=await Promise.all([
      fetch(`${BASE}/weather?lat=${lat}&lon=${lon}&appid=${KEY}&units=metric`),
      fetch(`${BASE}/forecast?lat=${lat}&lon=${lon}&appid=${KEY}&units=metric`),
      fetch(`${BASE}/air_pollution?lat=${lat}&lon=${lon}&appid=${KEY}`)
    ]);
    const cur=await wr.json();
    const fcast=fr.ok?await fr.json():null;
    const aqd=ar.ok?await ar.json():null;
    const aqi=aqd?.list?.[0]?.main?.aqi||null;
    if(!hint)document.getElementById('cityInput').value=cur.name;
    render(cur,fcast,aqi);
    document.getElementById('liveTag').style.display='flex';
    // Auto-refresh every 60s — only current conditions
    timer=setInterval(async()=>{
      try{
        const rr=await fetch(`${BASE}/weather?lat=${lat}&lon=${lon}&appid=${KEY}&units=metric`);
        if(rr.ok){const fresh=await rr.json();liveUpdate(fresh);}
      }catch(e){}
    },60000);
  }catch(e){errState('Failed to fetch weather data.');}
}

/* Live micro-update (no re-render) */
function liveUpdate(d){
  const te=document.getElementById('liveTemp');
  const ue=document.getElementById('upd');
  if(te)te.textContent=Math.round(d.main.temp);
  if(ue)ue.textContent=`Updated ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

/* Insights */
function insights(cur,fcast){
  const ins=[];
  const t=cur.main.temp,h=cur.main.humidity,w=cur.wind.speed;
  // Trend
  if(fcast?.list?.length>=4){
    const ts=fcast.list.slice(0,4).map(x=>x.main.temp);const d=ts[3]-ts[0];
    if(d>2)ins.push({l:'Temp Trend',v:`Rising ~${Math.abs(d).toFixed(1)}°C`,p:'Temperatures increasing over next hours.',c:'bw'});
    else if(d<-2)ins.push({l:'Temp Trend',v:`Falling ~${Math.abs(d).toFixed(1)}°C`,p:'Cooler conditions ahead.',c:'bi'});
    else ins.push({l:'Temp Trend',v:'Stable',p:'Temperature stays steady.',c:'bg'});
  }
  // Rain
  const rn=fcast?.list?.slice(0,8).filter(f=>f.weather[0].id>=500&&f.weather[0].id<700)||[];
  if(rn.length){const rt=new Date(rn[0].dt*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});ins.push({l:'Precipitation',v:`Rain ~${rt}`,p:'Bring an umbrella — rain is approaching.',c:'bw'});}
  else ins.push({l:'Precipitation',v:'Clear next 24h',p:'No significant rain expected.',c:'bg'});
  // Comfort
  let cv,cc;
  if(t<10){cv='Cold — Layer up';cc='bi';}else if(t<20){cv='Cool — Light jacket';cc='bi';}
  else if(t<27&&h<60){cv='Comfortable';cc='bg';}else if(t>=27&&h>=70){cv='Humid & hot';cc='bw';}
  else if(t>=35){cv='Very hot — Hydrate!';cc='bw';}else{cv='Pleasant';cc='bg';}
  ins.push({l:'Comfort',v:cv,p:`Feels like ${Math.round(cur.main.feels_like)}°C`,c:cc});
  // Wind
  const km=(w*3.6).toFixed(0);
  if(w>10)ins.push({l:'Wind Advisory',v:`${km} km/h — Strong`,p:'High winds may impact outdoor activities.',c:'bw'});
  else if(w>5)ins.push({l:'Wind',v:`${km} km/h — Breezy`,p:'Comfortable breeze.',c:'bi'});
  else ins.push({l:'Wind',v:`${km} km/h — Calm`,p:'Very calm conditions.',c:'bg'});
  // Visibility
  if(cur.visibility){const v=(cur.visibility/1000).toFixed(1);
    if(v<1)ins.push({l:'Visibility',v:`${v} km — Poor`,p:'Low visibility. Drive carefully.',c:'bw'});
    else if(v<5)ins.push({l:'Visibility',v:`${v} km — Moderate`,p:'Reduced visibility.',c:'bi'});
    else ins.push({l:'Visibility',v:`${v} km — Clear`,p:'Excellent visibility conditions.',c:'bg'});}
  // Pressure
  const p=cur.main.pressure;
  if(p<1000)ins.push({l:'Pressure',v:`${p} hPa — Low`,p:'Low pressure → possible rain incoming.',c:'bw'});
  else if(p>1020)ins.push({l:'Pressure',v:`${p} hPa — High`,p:'High pressure → stable, fair weather likely.',c:'bg'});
  else ins.push({l:'Pressure',v:`${p} hPa`,p:'Normal atmospheric pressure.',c:'bi'});
  return ins;
}

/* Render */
function render(cur,fcast,aqi){
  const nt=cur.weather[0].icon?.includes('n');
  const ic=emo(cur.weather[0].id,nt);
  const tmp=Math.round(cur.main.temp);
  const fl=Math.round(cur.main.feels_like);
  const desc=cur.weather[0].description.replace(/\b\w/g,c=>c.toUpperCase());
  const ins=insights(cur,fcast);
  const kmh=(cur.wind.speed*3.6).toFixed(0);
  const wdir=wd(cur.wind.deg||0);
  const vis=cur.visibility?(cur.visibility/1000).toFixed(1):'--';
  const rise=new Date(cur.sys.sunrise*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const set=new Date(cur.sys.sunset*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  /* forecast HTML */
  let fcHTML='';
  if(fcast){
    const days={},tk=new Date().toLocaleDateString('en-US',{weekday:'short'});
    fcast.list.forEach(it=>{const k=new Date(it.dt*1000).toLocaleDateString('en-US',{weekday:'short'});if(!days[k])days[k]=[];days[k].push(it);});
    fcHTML=Object.entries(days).slice(0,5).map(([d,it])=>{
      const hi=Math.round(Math.max(...it.map(x=>x.main.temp_max)));
      const lo=Math.round(Math.min(...it.map(x=>x.main.temp_min)));
      const m=it[Math.floor(it.length/2)];
      const rp=Math.round(Math.max(...it.map(x=>x.pop||0))*100);
      return`<div class="fc-day ${d===tk?'today':''}"><div class="fc-name">${d===tk?'Today':d}</div><div class="fc-emo">${emo(m.weather[0].id,false)}</div><div class="fc-temps"><span class="th">${hi}°</span><span class="tl">${lo}°</span></div><div class="fc-desc">${m.weather[0].main}</div>${rp>10?`<div class="fc-rain">💧${rp}%</div>`:''}</div>`;
    }).join('');
  }

  /* hourly */
  let hrHTML='';
  if(fcast){
    hrHTML=fcast.list.slice(0,12).map(it=>{
      const d=new Date(it.dt*1000);const isN=d.getHours()<6||d.getHours()>=19;
      const rp=Math.round((it.pop||0)*100);
      return`<div class="hr-item"><div class="hr-time">${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div><div class="hr-emo">${emo(it.weather[0].id,isN)}</div><div class="hr-temp">${Math.round(it.main.temp)}°</div>${rp>10?`<div class="hr-rain">💧${rp}%</div>`:''}</div>`;
    }).join('');
  }

  /* insights */
  const insHTML=ins.map((x,i)=>`<div class="ins-item" style="animation:fadeIn .4s ease ${i*.05}s both"><div class="ins-lbl">${x.l}</div><div class="ins-val">${x.v}</div><span class="ins-badge ${x.c}">${x.c==='bg'?'✓':x.c==='bw'?'⚠':'ℹ'} ${x.p}</span></div>`).join('');
  let aqiHTML='';
  if(aqi){const a=aql(aqi);aqiHTML=`<div class="ins-item"><div class="ins-lbl">Air Quality Index</div><div class="ins-val">AQI ${aqi}</div><span class="ins-badge ${a.c}">${a.l}</span></div>`;}

  /* stat bars */
  const hb=pb(cur.main.humidity,'linear-gradient(90deg,var(--aurora-blue),var(--aurora-cyan))');
  const wb=pb(Math.min(100,(kmh/80)*100),'var(--aurora-orange)');
  const cb=pb(cur.clouds?.all||0,'linear-gradient(90deg,var(--text-muted),var(--text-secondary))');
  const prb=pb(Math.min(100,Math.max(0,((cur.main.pressure-950)/100)*100)),'var(--aurora-green)');
  const ttp=Math.min(100,Math.max(0,((tmp+10)/50)*100));
  const tcol=tmp<10?'var(--aurora-blue)':tmp<25?'var(--aurora-green)':tmp<35?'var(--aurora-orange)':'#ff3b30';
  const tb=pb(ttp,tcol);

  document.getElementById('mainGrid').innerHTML=`
    <div class="card hero-card">
      <div class="city-label"><span class="rdot" style="width:6px;height:6px"></span>${cur.name}, ${cur.sys.country}<span class="live-badge"><span class="rdot" style="width:5px;height:5px;animation:rdot 1.5s infinite"></span>LIVE</span></div>
      <div class="temp-big"><span id="liveTemp">${tmp}</span><span class="temp-unit-sup">°C</span></div>
      <div class="updated-tag" id="upd">Updated ${now}</div>
      <div class="wx-desc">${desc}</div>
      <div class="wx-meta">
        <div class="mi">🌡️ Feels ${fl}°C</div>
        <div class="mi">💧 ${cur.main.humidity}%</div>
        <div class="mi">🌅 ${rise}</div>
        <div class="mi">🌇 ${set}</div>
        <div class="mi">☁️ ${cur.clouds?.all||0}%</div>
        <div class="mi">👁 ${vis} km</div>
        <div class="mi">🌬️ ${kmh} km/h ${wdir}</div>
      </div>
      <div class="wx-emoji">${ic}</div>
    </div>

    <div class="card map-card">
      <div class="map-header">
        <div class="card-title">📍 Location Map</div>
        <div class="map-coords" id="mcoords">${cur.coord.lat.toFixed(4)}°, ${cur.coord.lon.toFixed(4)}°</div>
      </div>
      <div id="weatherMap"></div>
    </div>

    <div class="card stats-card">
      <div class="stat-item"><div class="sv" style="color:var(--aurora-cyan)">${cur.main.humidity}%</div><div class="sl">Humidity</div>${hb}</div>
      <div class="stat-item"><div class="sv" style="color:var(--aurora-orange)">${kmh}<span style="font-size:14px"> km/h</span></div><div class="sl">Wind ${wdir}</div>${wb}</div>
      <div class="stat-item"><div class="sv" style="color:var(--text-secondary)">${cur.clouds?.all||0}%</div><div class="sl">Cloud Cover</div>${cb}</div>
      <div class="stat-item"><div class="sv" style="color:var(--aurora-green)">${cur.main.pressure}</div><div class="sl">Pressure hPa</div>${prb}</div>
      <div class="stat-item"><div class="sv" style="color:var(--aurora-purple)">${Math.round(cur.main.temp_max)}°/${Math.round(cur.main.temp_min)}°</div><div class="sl">High / Low</div>${tb}</div>
    </div>

    <div class="card forecast-card">
      <div class="card-title">5-Day Forecast</div>
      <div class="fc-grid">${fcHTML||'<div style="color:var(--text-muted);font-size:12px;padding:16px">Forecast unavailable</div>'}</div>
    </div>

    <div class="card insights-card">
      <div class="card-title" style="margin-bottom:14px">Predictive Insights</div>
      ${insHTML}${aqiHTML}
    </div>

    <div class="card hourly-card">
      <div class="card-title">24-Hour Timeline</div>
      <div class="hr-scroll">${hrHTML||'<div style="color:var(--text-muted);font-size:12px">Hourly data unavailable</div>'}</div>
    </div>
  `;

  // Mount Leaflet map after DOM is ready
  requestAnimationFrame(()=>{
    setTimeout(()=>initMap(cur.coord.lat,cur.coord.lon,`${cur.name}, ${cur.sys.country}`),100);
  });
}
</script>
</body>
</html>
